<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      overflow: hidden;
      width: 100%;
    }
    #dlsite-widget-inner {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      display: inline-block;
    }
    #dlsite-widget-inner img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div id="dlsite-widget-inner">
    <script type="text/javascript">
      blogparts = {
        "base": "https://www.dlsite.com/",
        "type": "ranking",
        "site": "maniax",
        "query": { "period": "week" },
        "title": "ランキング",
        "display": "horizontal",
        "detail": "0",
        "column": "v",
        "image": "large",
        "count": "3",
        "wrapper": "1",
        "autorotate": true,
        "aid": "Koremiyoonline"
      };
    </script>
    <script type="text/javascript" src="https://www.dlsite.com/js/blogparts.js" charset="UTF-8"></script>
  </div>
  <script>
    // ウィジェット読み込み完了後、実際のコンテンツ高さを親ウィンドウに通知して余白をなくす
    function sendHeight() {
      var h = document.getElementById('dlsite-widget-inner').scrollHeight;
      window.parent.postMessage({ type: 'dlsite-widget-height', height: h }, '*');
    }
    window.addEventListener('load', function() {
      // ウィジェットのスクリプトがDOM操作を完了するまで少し待つ
      setTimeout(sendHeight, 800);
    });
  </script>
</body>
</html>
